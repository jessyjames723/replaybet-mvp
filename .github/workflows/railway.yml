name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Railway CLI
        run: npm install -g @railway/cli
        
      - name: Deploy to Railway
        run: |
          railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 05d6e8ad-63f6-440a-bb47-50051c10b4a4
          RAILWAY_SERVICE_ID: 8da506f7-c6da-491a-8db4-11110f931fd8
          RAILWAY_ENVIRONMENT_ID: 19f8f599-8ac7-4e8f-a7a5-5ae97892cf14
