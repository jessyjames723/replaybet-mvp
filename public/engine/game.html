<!doctype html>
<html>
<head>
<title>Sweet Bonanza 1000</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1">
<style>
body,html { margin:0; padding:0; background:#000; width:100%; height:100%; overflow:hidden; }
#gameCanvas { width:100%; height:100%; display:block; }
</style>
<link rel="stylesheet" href="/engine/desktop/style.css">
</head>
<body>
<div id="Desktop">
  <canvas id="gameCanvas"></canvas>
</div>

<script>
// ReplayBet - конфигурация игры
var UHT_ALL = false;
var UHT_DEVICE_TYPE = { MOBILE: false, DESKTOP: true };

// Предустанавливаем GAME_URL чтобы bootstrap нашёл файлы
(function() {
  var cfg = null;
  Object.defineProperty(window, 'UHT_CONFIG', {
    get: function() { return cfg; },
    set: function(v) {
      cfg = v;
      if (v && v.GAME_URL === '') {
        v.GAME_URL = '/engine/desktop/';
        v.GAME_URL_ALTERNATIVE = '/engine/desktop/';
      }
    },
    configurable: true
  });
})();
</script>

<script src="/engine/desktop/bootstrap.js?key=95b31"></script>

<script>
// Инициализируем после загрузки bootstrap
window.addEventListener('load', function() {
  if (typeof Html5GameManager !== 'undefined') {
    Html5GameManager.init({
      contextPath: "",
      cashierUrl: "",
      lobbyUrl: "",
      mobileCashierUrl: "",
      mobileLobbyUrl: "",
      extendSessionUrl: "",
      extendSessionInterval: 0,
      gameConfig: JSON.stringify({
        accountType: "R",
        currency: "USD",
        currencyOriginal: "USD",
        datapath: "/engine/desktop/",
        gameService: "/api/gameService",
        lang: "ru",
        vendor: "T",
        showRealCash: "1",
        clock: "0",
        mgckey: "__MGCKEY__",
        styleName: "sltg_bitzio",
        extend_events: "1",
        REGULATION: "",
        statisticsURL: "",
        lobbyUrl: "",
        historyType: "external"
      })
    });
  }
});
</script>
</body>
</html>
